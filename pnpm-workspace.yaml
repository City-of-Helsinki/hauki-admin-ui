# Block installation of dependencies released less than 1 week ago (supply-chain hardening)
minimumReleaseAge: 10080

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  unrs-resolver: true
overrides:
  vite: ^8.0.5
  picomatch: 4.0.4
  '@typescript-eslint/typescript-estree>minimatch': 9.0.7
