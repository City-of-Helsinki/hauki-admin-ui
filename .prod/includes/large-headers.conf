# Hauki-specific nginx include — picked up at server scope by the
# helsinki.azurecr.io/ubi9/nginx-126-spa-standard base image from
# /etc/nginx/includes/.
#
# Hauki's authentication uses long OIDC Authorization headers that
# overflow the default 8k header buffer and trigger HTTP 400 errors.
# This setting is intentionally kept out of the shared base image so
# other services keep the smaller default.
large_client_header_buffers 4 32k;
